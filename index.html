<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management System</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">
        <h1>Task Management System</h1>

        <section class="task-form">
            <h2>Add New Task</h2>

            <form id="task-form">
                <input type="text" id="title" placeholder="Task Title" required>

                <input type="text" id="description" placeholder="Task Description">

                <input type="number" id="priority" placeholder="Priority (1-5)" min="1" max="5" value="1">

                <button type="submit" class="add-task-btn">
                    Add Task
                </button>
            </form>
        </section>

        <section id="task-list">
            <!-- Tasks will be rendered here -->
        </section>

        <section class="stats">
            <h2>Statistics</h2>

            <p>
                Total Tasks:
                <span id="total-tasks">0</span>
            </p>

            <p>
                Completed Tasks:
                <span id="completed-tasks">0</span>
            </p>
        </section>
    </div>

    <script type="module" src="./src/dom.js"></script>
</body>

</html>
